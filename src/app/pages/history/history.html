<nav class="navbar">
  <span class="brand">Color Game</span>
  <div class="navbar-right">
    <span>{{ auth.username() }}</span>
    <a routerLink="/game">Retour au jeu</a>
    <button (click)="logout()">Log Out</button>
  </div>
</nav>

<div class="content">
  <h2>Mon historique</h2>

  <div class="filter">
    <label>Filtrer par date : <input type="date" [(ngModel)]="filterDate"></label>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Ligne</th>
        <th>Colonne</th>
        <th>Couleur</th>
      </tr>
    </thead>
    <tbody>
      @for (entry of filteredEntries; track entry.id) {
        <tr>
          <td>{{ entry.changedAt | date:'dd/MM/yyyy HH:mm' }}</td>
          <td>{{ entry.rowIndex }}</td>
          <td>{{ entry.colIndex }}</td>
          <td>
            <span class="color-swatch" [style.backgroundColor]="entry.color"></span>
            {{ entry.color }}
          </td>
        </tr>
      }
      @empty {
        <tr><td colspan="4">Aucun changement enregistré.</td></tr>
      }
    </tbody>
  </table>
</div>
