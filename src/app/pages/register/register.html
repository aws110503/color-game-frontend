<div class="register-wrapper">
  <div class="login-brand">
    <div class="brand-dots">
      <span class="brand-dot"></span>
      <span class="brand-dot"></span>
      <span class="brand-dot"></span>
      <span class="brand-dot"></span>
      <span class="brand-dot"></span>
    </div>
    <h1 class="brand-title">Color Game</h1>
    <p class="brand-subtitle">Entraîne ta mémoire visuelle</p>
  </div>

  <div class="login-card">
    <div class="login-header">
      <h2>Créer un compte</h2>
      <p>Rejoins la communauté Color Game</p>
    </div>

    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label class="form-label">Nom d'utilisateur</label>
        <div class="form-input-wrapper">
          <input
            type="text"
            class="form-input"
            [(ngModel)]="credentials.username"
            name="username"
            placeholder="AwsBENLETAIFA"
            required>
          <span class="form-icon">👤</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="form-input-wrapper">
          <input
            type="email"
            class="form-input"
            [(ngModel)]="credentials.email"
            name="email"
            placeholder="exemple@email.com"
            required>
          <span class="form-icon">✉️</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="form-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-input"
            [(ngModel)]="credentials.password"
            name="password"
            placeholder="••••••••"
            (input)="checkPasswordStrength()"
            required>
          <span class="form-icon">🔒</span>
          <button type="button" class="password-toggle" (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁' }}
          </button>
        </div>

        <!-- Password strength meter -->
        <div class="strength-meter" *ngIf="credentials.password">
          <div class="strength-bar">
            <div class="strength-fill" [style.width.%]="passwordScore * 25" [class]="'strength-' + passwordScore"></div>
          </div>
          <span class="strength-label" [class]="'strength-' + passwordScore">{{ strengthLabel }}</span>
        </div>
        <p class="strength-feedback" *ngIf="passwordFeedback">{{ passwordFeedback }}</p>
      </div>

      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <div class="form-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-input"
            [(ngModel)]="credentials.confirmPassword"
            name="confirmPassword"
            placeholder="••••••••"
            required>
          <span class="form-icon">🔐</span>
        </div>
        <p class="error-text" *ngIf="passwordMismatch">Les mots de passe ne correspondent pas</p>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="!isFormValid()">
        S'inscrire →
      </button>
    </form>

    <div class="login-footer">
      <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
    </div>
  </div>
</div>
