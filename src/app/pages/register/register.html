<div class="login-container">
  <h2>Inscription</h2>
  <form (ngSubmit)="onSubmit()">
    <div>
      <label>Nom d'utilisateur</label>
      <input type="text" [(ngModel)]="username" name="username" required>
    </div>
    <div>
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" required>
    </div>
    <div>
    <label>Mot de passe</label>
    <input
        type="password"
        [(ngModel)]="password"
        name="password"
        (input)="onPasswordChange()"
        required>

    @if (password) {
        <div class="strength-meter">
            <div class="strength-bar">
                <div class="strength-fill" [class]="'score-' + passwordScore"></div>
            </div>
            <span class="strength-label" [class]="'score-' + passwordScore">{{ passwordLabel }}</span>
        </div>
        @if (passwordFeedback) {
            <p class="hint">{{ passwordFeedback }}</p>
        }
    }
    </div>
    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
    @if (successMessage) {
      <p class="success">{{ successMessage }}</p>
    }
    <button type="submit">S'inscrire</button>
  </form>
  <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
</div>
